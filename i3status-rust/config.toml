[theme]
theme = "srcery" # Or "gruvbox-dark", etc.

[icons]
icons = "material-nf" # Requires Font Awesome 6

[[block]]
block = "sound"
step_width = 3
[[block.click]]
button = "left"
cmd = "pavucontrol"

[[block]]
block = "bluetooth"
mac = "XX:XX:XX:XX:XX:XX" # Optional: specific device, or leave empty for general status
[[block.click]]
button = "left"
cmd = "blueman-manager"

[[block]]
block = "cpu"
interval = 10
format = " $icon $utilization "

[[block]]
block = "memory"
interval = 10
format = " $icon $mem_used_percents "

[[block]]
block = "temperature"
format = " $icon $average avg "
format_alt = " $icon $min min, $max max, $average avg "
interval = 10
chip = "*-isa-*"

[[block]]
block = "net"
format = " $icon {$signal_strength $ssid $frequency|Wired connection}"

[[block]]
block = "time"
interval = 1
format = " $timestamp.datetime(f:'%a %d/%m %R') "

[[block]]
block = "pomodoro"
notify_cmd = "notify-send '{msg}'"
blocking_cmd = false
