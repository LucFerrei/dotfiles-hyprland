general.import = ["~/.config/alacritty/kanagawa-dragon.toml"]
[env]
# TERM = "alacritty"
TERM = "xterm-256color"
COLORTERM = "truecolor"

[window]
title = "Alacritty"
class = { instance = "Alacritty", general = "Alacritty" }
decorations = "none"
opacity = 0.9
blur = false
startup_mode = "Maximized"

[font]
# normal = { family = "VictorMono Nerd Font", style = "SemiBold" }
normal = { family = "ZedMono Nerd Font", style = "SemiBold" }
# size = 14
size = 15
